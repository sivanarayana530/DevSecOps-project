kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
nodes:
- role: control-plane
  kubeadmConfigPatches:
  - |
    kind: InitConfiguration
    nodeRegistration:
      kubeletExtraArgs:
        node-labels: "ingress-ready=true"
  # Avoid binding to privileged host ports (80/443) in the dev container environment.
  # If you need host access to the ingress, adjust these to unused high ports.
